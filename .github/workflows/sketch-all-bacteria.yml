name: Sketch All-the-Bacteria

# ---------------------------------------------------------------------------
# Testing mode (active): 200 400 genomes (1 002/job × 200 jobs), ≤ 200 parallel jobs
# Production mode:       all genomes,   ≤ 200 parallel jobs
#
# Design:
#   Chunking
#     Genomes are assigned to chunks using aws --include wildcard globs.
#     Prefix buckets are greedily balanced and must stay within ±10%.
#     Chunk count is derived from TARGET_CHUNK_SIZE (or MAX_JOBS).
#
#   Download → sketch (within each chunk job)
#     Each chunk first downloads with aws s3 cp --recursive --exclude '*' plus
#     chunk-specific --include globs, verifies all genomes are present, then
#     falls back to per-genome retries for any misses.
#
#   S3 retry
#     Wildcard downloads and fallback downloads are retried up to
#     DOWNLOAD_RETRIES (default 3) with linear backoff.
# ---------------------------------------------------------------------------

on:
  push:
  workflow_dispatch:
    inputs:
      max_genomes:
        description: 'Max genomes to process (0 = all). Use 200400 for remainder testing.'
        required: false
        default: '200400'
        type: string
      target_chunk_size:
        description: >
          Target genomes per chunk job (0 = derive from MAX_JOBS, spreading
          genomes evenly across 200 jobs). Override only if you need a fixed
          chunk size.
        required: false
        default: '0'
        type: string

# ── defaults used when triggered by push (no workflow_dispatch inputs) ───────
env:
  DEFAULT_MAX_GENOMES: '200400'      # 1002/job × 200 jobs; change to '0' for a full production run
  MAX_JOBS: '200'                    # hard cap on matrix entries (Actions limit: 256)
  DEFAULT_TARGET_CHUNK_SIZE: '0'     # 0 = spread evenly across MAX_JOBS (200) jobs
  DOWNLOAD_RETRIES: '3'              # S3 retry attempts per genome
  WORKERS_CAP: '4'                   # max concurrent fallback download workers per runner

# ---------------------------------------------------------------------------
# JOB 1 – prepare
#   • Download the AllTheBacteria assembly manifest from S3
#   • Subset (for testing) and build wildcard chunk manifests
#   • Emit a JSON array of chunk IDs
# ---------------------------------------------------------------------------
jobs:
  prepare:
    name: Download manifest and create chunks
    runs-on: ubuntu-latest
    outputs:
      chunks: ${{ steps.make-chunks.outputs.chunks }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up pixi
        uses: prefix-dev/setup-pixi@v0.9.6
        with:
          pixi-version: latest

      # Resolve effective settings (prefer workflow_dispatch input > env default)
      - name: Resolve parameters
        id: params
        run: |
          MAX="${{ github.event.inputs.max_genomes }}"
          TARGET="${{ github.event.inputs.target_chunk_size }}"
          echo "max_genomes=${MAX:-$DEFAULT_MAX_GENOMES}" >> "$GITHUB_OUTPUT"
          echo "target_chunk_size=${TARGET:-$DEFAULT_TARGET_CHUNK_SIZE}" >> "$GITHUB_OUTPUT"

      - name: Download assembly manifest from S3
        run: |
          set -euo pipefail
          mkdir -p data

          echo "=== Finding latest manifest file ==="
          LATEST=$(pixi run aws s3 ls --no-sign-request \
            s3://allthebacteria-metadata/allthebacteria-assemblies/assemblies-list/data/ \
            | sort | tail -n1 | awk '{print $4}')
          echo "Latest manifest: $LATEST"

          echo "=== Downloading manifest ==="
          pixi run aws s3 cp --no-sign-request \
            "s3://allthebacteria-metadata/allthebacteria-assemblies/assemblies-list/data/${LATEST}" \
            data/latest.tsv.gz

          echo "=== Extracting assembly filenames ==="
          # CSV format: "bucket","filename.fa.gz","size","date","md5",""
          zcat data/latest.tsv.gz \
            | cut -d',' -f2 \
            | tr -d '"' \
            > data/all_assemblies.txt

          TOTAL=$(wc -l < data/all_assemblies.txt)
          echo "Total assemblies in manifest: $TOTAL"

      - name: Subset and build wildcard chunks
        id: make-chunks
        run: |
          set -euo pipefail

          MAX_GENOMES="${{ steps.params.outputs.max_genomes }}"
          TARGET_CHUNK_SIZE="${{ steps.params.outputs.target_chunk_size }}"

          # Subset (skip when MAX_GENOMES=0 → use all)
          if [ "$MAX_GENOMES" -gt 0 ]; then
            head -n "$MAX_GENOMES" data/all_assemblies.txt > data/subset_assemblies.txt
          else
            cp data/all_assemblies.txt data/subset_assemblies.txt
          fi

          TOTAL=$(wc -l < data/subset_assemblies.txt)
          echo "Assemblies to process: $TOTAL"

          # Chunk sizing:
          #   1. Use TARGET_CHUNK_SIZE if > 0.
          #   2. Otherwise, spread genomes evenly across MAX_JOBS.
          #   3. Enforce MAX_JOBS cap.
          if [ "$TARGET_CHUNK_SIZE" -gt 0 ]; then
            CHUNK_SIZE="$TARGET_CHUNK_SIZE"
          else
            CHUNK_SIZE=$(( (TOTAL + MAX_JOBS - 1) / MAX_JOBS ))
          fi
          NUM_CHUNKS=$(( (TOTAL + CHUNK_SIZE - 1) / CHUNK_SIZE ))
          if [ "$NUM_CHUNKS" -gt "$MAX_JOBS" ]; then
            CHUNK_SIZE=$(( (TOTAL + MAX_JOBS - 1) / MAX_JOBS ))
            NUM_CHUNKS=$(( (TOTAL + CHUNK_SIZE - 1) / CHUNK_SIZE ))
          fi
          CHUNK_SIZE=$(( CHUNK_SIZE < 1 ? 1 : CHUNK_SIZE ))
          echo "Target chunk size: $CHUNK_SIZE genome(s) → $NUM_CHUNKS chunk(s) (MAX_JOBS=${MAX_JOBS})"

          # Build balanced wildcard chunks for aws --include.
          mkdir -p chunks
          python3 scripts/make_wildcard_chunks.py \
            --input data/subset_assemblies.txt \
            --out-dir chunks \
            --num-chunks "$NUM_CHUNKS" \
            --max-imbalance-pct 10 \
            --summary-json chunks/chunk_summary.json

          echo "=== Chunk files created ==="
          ls -lh chunks/

          # Build JSON array of chunk IDs, e.g. ["0000","0001",...]
          CHUNKS=$(jq -c '.chunk_ids' chunks/chunk_summary.json)
          echo "chunks=${CHUNKS}" >> "$GITHUB_OUTPUT"
          echo "Matrix: ${CHUNKS}"

      - name: Upload chunk manifests
        uses: actions/upload-artifact@v7
        with:
          name: chunk-manifests
          path: chunks/
          retention-days: 1   # ephemeral; only needed during this workflow run

# ---------------------------------------------------------------------------
# JOB 2 – sketch  (fan-out matrix over every chunk)
#   • Download chunk assemblies with aws --include wildcard patterns
#   • Verify chunk coverage, fallback-download any misses, sketch chunk
# ---------------------------------------------------------------------------
  sketch:
    name: Sketch chunk ${{ matrix.chunk }}
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      matrix:
        chunk: ${{ fromJSON(needs.prepare.outputs.chunks) }}
      fail-fast: false   # let other chunks continue even if one fails
    env:
      CHUNK: ${{ matrix.chunk }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up pixi
        uses: prefix-dev/setup-pixi@v0.9.6
        with:
          pixi-version: latest

      - name: Download chunk manifests artifact
        uses: actions/download-artifact@v8
        with:
          name: chunk-manifests
          path: chunks/

      # ── Batch download → sketch → delete (up to 1000 genomes per batch) ──
      - name: Download, sketch, and delete assemblies
        run: |
          set -euo pipefail

          CHUNK_FILE="chunks/chunk_${CHUNK}.txt"
          INCLUDE_FILE="chunks/chunk_${CHUNK}.includes.txt"

          # Worker count for parallel downloads: available CPUs, capped at WORKERS_CAP
          AVAIL=$(nproc 2>/dev/null || echo 2)
          WORKERS=$(( AVAIL < WORKERS_CAP ? AVAIL : WORKERS_CAP ))

          # Resolve the absolute path to mash once so that parallel subshells
          # (used for downloads) can use it.
          MASH_BIN=$(pixi run which mash)
          export MASH_BIN

          mkdir -p assemblies

          if [ ! -f "${CHUNK_FILE}" ] || [ ! -f "${INCLUDE_FILE}" ]; then
            echo "ERROR: missing chunk manifest(s) for chunk ${CHUNK}"
            exit 1
          fi

          TOTAL=$(grep -vc '^[[:space:]]*$' "${CHUNK_FILE}")
          echo "Chunk ${CHUNK}: ${TOTAL} genomes"

          mapfile -t INCLUDE_PATTERNS < <(grep -v '^[[:space:]]*$' "${INCLUDE_FILE}")
          if [ "${#INCLUDE_PATTERNS[@]}" -eq 0 ]; then
            echo "ERROR: no include patterns found in ${INCLUDE_FILE}"
            exit 1
          fi

          AWS_ARGS=(
            s3 cp
            --recursive
            --no-sign-request
            --no-progress
            s3://allthebacteria-assemblies/
            assemblies/
            --exclude "*"
          )
          for pattern in "${INCLUDE_PATTERNS[@]}"; do
            AWS_ARGS+=(--include "${pattern}")
          done

          MISSING_FILE=$(mktemp)
          trap 'rm -f "${MISSING_FILE}"' EXIT
          write_missing() {
            : > "${MISSING_FILE}"
            while IFS= read -r genome; do
              [ -z "${genome}" ] && continue
              [ -f "assemblies/${genome}" ] || echo "${genome}" >> "${MISSING_FILE}"
            done < "${CHUNK_FILE}"
          }

          for attempt in $(seq 1 "${DOWNLOAD_RETRIES}"); do
            echo "Wildcard download attempt ${attempt}/${DOWNLOAD_RETRIES}"
            aws "${AWS_ARGS[@]}" >/dev/null || true
            write_missing
            MISSING_COUNT=$(wc -l < "${MISSING_FILE}")
            if [ "${MISSING_COUNT}" -eq 0 ]; then
              break
            fi
            echo "Missing ${MISSING_COUNT} genome(s) after wildcard attempt ${attempt}" >&2
            sleep $(( attempt * 5 ))
          done

          write_missing
          MISSING_COUNT=$(wc -l < "${MISSING_FILE}")
          if [ "${MISSING_COUNT}" -gt 0 ]; then
            echo "Running per-genome fallback for ${MISSING_COUNT} genome(s)"
            xargs -P "${WORKERS}" -I{} bash -c '
              genome="$1"
              s3_uri="s3://allthebacteria-assemblies/${genome}"
              for attempt in $(seq 1 '"${DOWNLOAD_RETRIES}"'); do
                if aws s3 cp --no-sign-request --no-progress \
                     "$s3_uri" "assemblies/${genome}" >/dev/null; then
                  exit 0
                fi
                sleep $(( attempt * 5 ))
              done
              echo "ERROR: failed to download ${genome}" >&2
              exit 1
            ' -- {} < "${MISSING_FILE}" || true
          fi

          write_missing
          MISSING_COUNT=$(wc -l < "${MISSING_FILE}")
          if [ "${MISSING_COUNT}" -gt 0 ]; then
            echo "ERROR: ${MISSING_COUNT} genome(s) still missing after fallback" >&2
            head -n 20 "${MISSING_FILE}" >&2
            exit 1
          fi

          GENOME_PATHS=()
          while IFS= read -r genome; do
            [ -f "assemblies/${genome}" ] && GENOME_PATHS+=("assemblies/${genome}")
          done < "${CHUNK_FILE}"
          if [ "${#GENOME_PATHS[@]}" -eq 0 ]; then
            echo "ERROR: no assemblies downloaded for chunk ${CHUNK}"
            exit 1
          fi

          echo "Sketching ${#GENOME_PATHS[@]} assemblies for chunk ${CHUNK}"
          "$MASH_BIN" sketch -k 21 -s 1000 -o "chunk_${CHUNK}" "${GENOME_PATHS[@]}"
          rm -f "${GENOME_PATHS[@]}"
          echo "=== Chunk sketch info ==="
          pixi run mash info "chunk_${CHUNK}.msh"

      - name: Upload chunk sketch
        uses: actions/upload-artifact@v7
        with:
          name: sketch-chunk-${{ matrix.chunk }}
          path: chunk_${{ matrix.chunk }}.msh
          retention-days: 7

# ---------------------------------------------------------------------------
# JOB 3 – combine
#   • Download every chunk sketch artifact
#   • mash paste → all-the-sketches.msh
#   • Upload the final sketch and optionally publish to a GitHub Release
# ---------------------------------------------------------------------------
  combine:
    name: Combine all chunk sketches
    needs: [prepare, sketch]
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required to create releases and upload assets

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up pixi
        uses: prefix-dev/setup-pixi@v0.9.6
        with:
          pixi-version: latest

      - name: Download all chunk sketches
        uses: actions/download-artifact@v8
        with:
          pattern: sketch-chunk-*
          path: chunk-sketches/
          merge-multiple: true   # flatten all artifacts into one directory

      - name: List chunk sketches
        run: |
          echo "=== Chunk sketches available ==="
          ls -lh chunk-sketches/
          echo "Total files: $(ls chunk-sketches/ | wc -l)"

      - name: Combine into final sketch
        run: |
          set -euo pipefail

          pixi run mash paste all-the-sketches.msh chunk-sketches/*.msh
          echo "=== Final sketch info ==="
          pixi run mash info all-the-sketches.msh

      - name: Upload final combined sketch
        uses: actions/upload-artifact@v7
        with:
          name: all-the-sketches
          path: all-the-sketches.msh
          retention-days: 90

      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "all-the-sketches ${{ github.ref_name }}" \
            --notes "Combined Mash sketch of AllTheBacteria assemblies (tag \`${{ github.ref_name }}\`)." \
            all-the-sketches.msh \
          || gh release upload "${{ github.ref_name }}" \
               all-the-sketches.msh --clobber
