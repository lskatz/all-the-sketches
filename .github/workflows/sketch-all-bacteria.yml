name: Sketch All-the-Bacteria

# ---------------------------------------------------------------------------
# Testing mode (active): 1 000 genomes, ≤ 200 parallel jobs
# Production mode:       all genomes,   ≤ 200 parallel jobs
#
# Optimization levers (over the original sequential single-engine design):
#
#   Intra-chunk parallelism
#     WORKERS genomes processed concurrently per runner (GNU parallel).
#     WORKERS = min(nproc, WORKERS_CAP); default cap = 4 to bound disk usage.
#     Each worker owns its full download → mash sketch → delete cycle.
#
#   S3 retry
#     Each download is retried up to DOWNLOAD_RETRIES times (default 3) with
#     linear backoff before the genome is skipped.  One slow object no
#     longer stalls the whole chunk.
#
#   Timeout-safe chunking
#     TARGET_CHUNK_SIZE (default 50) is the primary chunk-size driver.
#     With WORKERS=4 and ~30 s/genome this is ~6 min/chunk — well within
#     the 6-hour GitHub Actions limit.
#     If TARGET_CHUNK_SIZE would produce > MAX_JOBS chunks it is scaled up
#     to stay within the Actions matrix limit (hard limit: 256).
#
#   Per-step timing
#     Every major step emits "TIMING key=Xs" lines so CI logs can be used
#     directly for bottleneck analysis without external monitoring.
# ---------------------------------------------------------------------------

on:
  push:
  workflow_dispatch:
    inputs:
      max_genomes:
        description: 'Max genomes to process (0 = all). Use 1000 for testing.'
        required: false
        default: '1000'
        type: string
      target_chunk_size:
        description: >
          Target genomes per chunk job (0 = derive from MAX_JOBS only).
          Default 50: ~6 min/chunk at 4 parallel workers × 30 s/genome.
        required: false
        default: '50'
        type: string

# ── defaults used when triggered by push (no workflow_dispatch inputs) ───────
env:
  DEFAULT_MAX_GENOMES: '1000'        # change to '0' for a full production run
  MAX_JOBS: '200'                    # hard cap on matrix entries (Actions limit: 256)
  DEFAULT_TARGET_CHUNK_SIZE: '50'    # timeout-safe chunk size (see header notes)
  DOWNLOAD_RETRIES: '3'              # S3 retry attempts per genome
  WORKERS_CAP: '4'                   # max parallel sketch workers per runner

# ---------------------------------------------------------------------------
# JOB 1 – prepare
#   • Download the AllTheBacteria assembly manifest from S3
#   • Subset (for testing) and split into timeout-safe chunk files
#   • Emit a JSON array of chunk IDs
# ---------------------------------------------------------------------------
jobs:
  prepare:
    name: Download manifest and create chunks
    runs-on: ubuntu-latest
    outputs:
      chunks: ${{ steps.make-chunks.outputs.chunks }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up pixi
        uses: prefix-dev/setup-pixi@v0.9.6
        with:
          pixi-version: latest

      # Resolve effective settings (prefer workflow_dispatch input > env default)
      - name: Resolve parameters
        id: params
        run: |
          MAX="${{ github.event.inputs.max_genomes }}"
          TARGET="${{ github.event.inputs.target_chunk_size }}"
          echo "max_genomes=${MAX:-$DEFAULT_MAX_GENOMES}" >> "$GITHUB_OUTPUT"
          echo "target_chunk_size=${TARGET:-$DEFAULT_TARGET_CHUNK_SIZE}" >> "$GITHUB_OUTPUT"

      - name: Download assembly manifest from S3
        run: |
          set -euo pipefail
          T0=$SECONDS
          mkdir -p data

          echo "=== Finding latest manifest file ==="
          LATEST=$(pixi run aws s3 ls --no-sign-request \
            s3://allthebacteria-metadata/allthebacteria-assemblies/assemblies-list/data/ \
            | sort | tail -n1 | awk '{print $4}')
          echo "Latest manifest: $LATEST"

          echo "=== Downloading manifest ==="
          pixi run aws s3 cp --no-sign-request \
            "s3://allthebacteria-metadata/allthebacteria-assemblies/assemblies-list/data/${LATEST}" \
            data/latest.tsv.gz

          echo "=== Extracting assembly filenames ==="
          # CSV format: "bucket","filename.fa.gz","size","date","md5",""
          zcat data/latest.tsv.gz \
            | cut -d',' -f2 \
            | tr -d '"' \
            > data/all_assemblies.txt

          TOTAL=$(wc -l < data/all_assemblies.txt)
          echo "Total assemblies in manifest: $TOTAL"
          echo "TIMING manifest_download=$((SECONDS - T0))s"

      - name: Subset and split into chunks
        id: make-chunks
        run: |
          set -euo pipefail
          T0=$SECONDS

          MAX_GENOMES="${{ steps.params.outputs.max_genomes }}"
          TARGET_CHUNK_SIZE="${{ steps.params.outputs.target_chunk_size }}"

          # Subset (skip when MAX_GENOMES=0 → use all)
          if [ "$MAX_GENOMES" -gt 0 ]; then
            head -n "$MAX_GENOMES" data/all_assemblies.txt > data/subset_assemblies.txt
          else
            cp data/all_assemblies.txt data/subset_assemblies.txt
          fi

          TOTAL=$(wc -l < data/subset_assemblies.txt)
          echo "Assemblies to process: $TOTAL"

          # Chunk sizing (timeout-safe):
          #   1. Use TARGET_CHUNK_SIZE if > 0 to bound per-job runtime.
          #   2. If that creates > MAX_JOBS chunks, scale up chunk size to
          #      stay within the Actions matrix limit.
          #   3. Guard: at least 1 genome per chunk.
          if [ "$TARGET_CHUNK_SIZE" -gt 0 ]; then
            CHUNK_SIZE="$TARGET_CHUNK_SIZE"
          else
            CHUNK_SIZE=$(( (TOTAL + MAX_JOBS - 1) / MAX_JOBS ))
          fi
          NUM_CHUNKS=$(( (TOTAL + CHUNK_SIZE - 1) / CHUNK_SIZE ))
          if [ "$NUM_CHUNKS" -gt "$MAX_JOBS" ]; then
            CHUNK_SIZE=$(( (TOTAL + MAX_JOBS - 1) / MAX_JOBS ))
            NUM_CHUNKS=$(( (TOTAL + CHUNK_SIZE - 1) / CHUNK_SIZE ))
          fi
          CHUNK_SIZE=$(( CHUNK_SIZE < 1 ? 1 : CHUNK_SIZE ))
          echo "Chunk size: $CHUNK_SIZE genome(s) → $NUM_CHUNKS chunk(s) (MAX_JOBS=${MAX_JOBS})"

          # Split into fixed-size chunks
          mkdir -p chunks
          split \
            --lines="$CHUNK_SIZE" \
            --numeric-suffixes \
            --suffix-length=4 \
            data/subset_assemblies.txt \
            chunks/chunk_

          # Rename to add .txt extension so the artifact is tidy
          for f in chunks/chunk_????; do
            mv "$f" "${f}.txt"
          done

          echo "=== Chunk files created ==="
          ls -lh chunks/

          # Build JSON array of chunk IDs, e.g. ["0000","0001",...]
          CHUNKS=$(ls chunks/chunk_*.txt \
            | sed 's|chunks/chunk_||' \
            | sed 's|\.txt||' \
            | jq -R . \
            | jq -sc .)
          echo "chunks=${CHUNKS}" >> "$GITHUB_OUTPUT"
          echo "Matrix: ${CHUNKS}"
          echo "TIMING make_chunks=$((SECONDS - T0))s"

      - name: Upload chunk manifests
        uses: actions/upload-artifact@v7
        with:
          name: chunk-manifests
          path: chunks/
          retention-days: 1   # ephemeral; only needed during this workflow run

# ---------------------------------------------------------------------------
# JOB 2 – sketch  (fan-out matrix over every chunk)
#   • WORKERS genomes processed in parallel (GNU parallel)
#   • Each worker: download (with retry) → mash sketch → delete assembly
#   • Paste per-genome sketches into one chunk .msh file
# ---------------------------------------------------------------------------
  sketch:
    name: Sketch chunk ${{ matrix.chunk }}
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      matrix:
        chunk: ${{ fromJSON(needs.prepare.outputs.chunks) }}
      fail-fast: false   # let other chunks continue even if one fails
    env:
      CHUNK: ${{ matrix.chunk }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up pixi
        uses: prefix-dev/setup-pixi@v0.9.6
        with:
          pixi-version: latest

      - name: Download chunk manifests artifact
        uses: actions/download-artifact@v8
        with:
          name: chunk-manifests
          path: chunks/

      - name: Disk space (before)
        run: df -h

      # ── Parallel download → sketch → delete ─────────────────────────────
      - name: Download, sketch, and delete assemblies
        run: |
          set -euo pipefail
          T0=$SECONDS

          CHUNK_FILE="chunks/chunk_${CHUNK}.txt"
          echo "=== Chunk: ${CHUNK} ==="
          cat "$CHUNK_FILE"
          echo ""

          # Worker count: available CPUs, capped at WORKERS_CAP
          AVAIL=$(nproc 2>/dev/null || echo 2)
          WORKERS=$(( AVAIL < WORKERS_CAP ? AVAIL : WORKERS_CAP ))
          echo "Workers: ${WORKERS} (nproc=${AVAIL}, cap=${WORKERS_CAP})"

          mkdir -p assemblies sketches

          # Resolve the absolute path to mash once so that parallel subshells
          # can use it directly.  GNU parallel's bash workers do not reliably
          # inherit the pixi-activated PATH (the pixi env bin dir may not be
          # visible inside BASH_ENV-sourced scripts), so calling mash by bare
          # name fails.  Capturing the path here — where pixi is active — and
          # exporting it sidesteps that limitation without wrapping every call
          # in `pixi run` (which would add per-genome pixi overhead).
          MASH_BIN=$(pixi run which mash)
          export MASH_BIN

          # Per-genome worker — runs inside GNU parallel subshells.
          sketch_one() {
            local genome="$1"
            local accession="${genome%.fa.gz}"
            local s3_uri="s3://allthebacteria-assemblies/${genome}"
            local T0=$SECONDS   # $SECONDS resets to 0 in each parallel subshell
            local attempt downloaded=false

            for attempt in $(seq 1 "${DOWNLOAD_RETRIES}"); do
              if aws s3 cp --no-sign-request \
                     "$s3_uri" "assemblies/${genome}" 2>&1; then
                downloaded=true
                break
              fi
              if [ "$attempt" -ge "${DOWNLOAD_RETRIES}" ]; then
                echo "SKIP ${genome}: download failed after ${DOWNLOAD_RETRIES} attempts"
              else
                echo "Retry ${attempt}/${DOWNLOAD_RETRIES} for ${genome}"
                sleep $((attempt * 5))
              fi
            done

            [ "$downloaded" = true ] || return 0

            if ! "$MASH_BIN" sketch -k 21 -s 1000 \
                   -o "sketches/${accession}" "assemblies/${genome}" 2>&1; then
              echo "SKIP ${genome}: sketch failed"
              rm -f "assemblies/${genome}"
              return 0
            fi

            rm -f "assemblies/${genome}"
            echo "OK ${accession} elapsed=$(( SECONDS - T0 ))s"
          }
          export -f sketch_one
          export DOWNLOAD_RETRIES

          # Strip blank lines into a temp file; trap ensures cleanup on failure
          GENOMES_TMP=$(mktemp)
          trap 'rm -f "${GENOMES_TMP}"' EXIT
          grep -v '^[[:space:]]*$' "${CHUNK_FILE}" > "${GENOMES_TMP}"

          # Run each genome through sketch_one in parallel
          parallel --jobs "${WORKERS}" --line-buffer sketch_one \
            :::: "${GENOMES_TMP}"

          PRODUCED=$(ls sketches/*.msh 2>/dev/null | wc -l)
          EXPECTED=$(grep -c '[^[:space:]]' "${CHUNK_FILE}" || echo 0)
          echo ""
          echo "=== Chunk ${CHUNK}: ${PRODUCED}/${EXPECTED} sketches produced ==="
          echo "TIMING sketch_step=$((SECONDS - T0))s"
          ls -lh sketches/

      - name: Disk space (after sketching)
        run: df -h

      # ── Paste per-genome sketches into one chunk sketch ──────────────────
      - name: Paste per-genome sketches into chunk sketch
        run: |
          set -euo pipefail
          T0=$SECONDS

          SKETCH_COUNT=$(ls sketches/*.msh 2>/dev/null | wc -l)
          if [ "$SKETCH_COUNT" -eq 0 ]; then
            echo "ERROR: no sketches produced for chunk ${CHUNK}"
            exit 1
          fi
          echo "Pasting ${SKETCH_COUNT} sketches for chunk ${CHUNK}"

          pixi run mash paste "chunk_${CHUNK}.msh" sketches/*.msh
          echo "=== Chunk sketch info ==="
          pixi run mash info "chunk_${CHUNK}.msh"
          echo "TIMING mash_paste=$((SECONDS - T0))s"

      - name: Upload chunk sketch
        uses: actions/upload-artifact@v7
        with:
          name: sketch-chunk-${{ matrix.chunk }}
          path: chunk_${{ matrix.chunk }}.msh
          retention-days: 7

# ---------------------------------------------------------------------------
# JOB 3 – combine
#   • Download every chunk sketch artifact
#   • mash paste → all-the-sketches.msh
#   • Upload the final sketch and optionally publish to a GitHub Release
# ---------------------------------------------------------------------------
  combine:
    name: Combine all chunk sketches
    needs: [prepare, sketch]
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required to create releases and upload assets

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up pixi
        uses: prefix-dev/setup-pixi@v0.9.6
        with:
          pixi-version: latest

      - name: Download all chunk sketches
        uses: actions/download-artifact@v8
        with:
          pattern: sketch-chunk-*
          path: chunk-sketches/
          merge-multiple: true   # flatten all artifacts into one directory

      - name: List chunk sketches
        run: |
          echo "=== Chunk sketches available ==="
          ls -lh chunk-sketches/
          echo "Total files: $(ls chunk-sketches/ | wc -l)"

      - name: Disk space (before paste)
        run: df -h

      - name: Combine into final sketch
        run: |
          set -euo pipefail
          T0=$SECONDS

          pixi run mash paste all-the-sketches.msh chunk-sketches/*.msh
          echo "=== Final sketch info ==="
          pixi run mash info all-the-sketches.msh
          echo "TIMING final_mash_paste=$((SECONDS - T0))s"

      - name: Disk space (after paste)
        run: df -h

      - name: Upload final combined sketch
        uses: actions/upload-artifact@v7
        with:
          name: all-the-sketches
          path: all-the-sketches.msh
          retention-days: 90

      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "all-the-sketches ${{ github.ref_name }}" \
            --notes "Combined Mash sketch of AllTheBacteria assemblies (tag \`${{ github.ref_name }}\`)." \
            all-the-sketches.msh \
          || gh release upload "${{ github.ref_name }}" \
               all-the-sketches.msh --clobber
